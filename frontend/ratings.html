<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ratings | BackHouse</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Work+Sans:ital,wght@0,300..700;1,300..700&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
    <!-- Styles -->
    <link rel="stylesheet" href="styles.css?v=5">
    <link rel="stylesheet" href="ratings.css">
</head>
<body class="dashboard-body">

    <div class="dashboard-layout">
        
        <!-- Sidebar Navigation (Dynamically Loaded) -->
        <aside class="dashboard-sidebar" id="main-sidebar">
            <div style="padding: 2rem; opacity: 0.5;">
                <div style="height: 40px; width: 140px; background: rgba(0,0,0,0.05); border-radius: 8px; margin-bottom: 3rem;"></div>
                <div style="height: 20px; width: 100%; background: rgba(0,0,0,0.05); border-radius: 4px; margin-bottom: 1rem;"></div>
                <div style="height: 20px; width: 80%; background: rgba(0,0,0,0.05); border-radius: 4px; margin-bottom: 1rem;"></div>
            </div>
        </aside>

        <!-- Main Content Area -->
        <div class="dashboard-main-container">
            
            <!-- Header -->
            <header class="dashboard-header">
                <div class="dashboard-header__left">
                    <h2 class="dashboard-header__title">Ratings</h2>
                    <div class="dashboard-header__divider"></div>
                    <div class="dashboard-header__tabs">
                        <button class="header-tab header-tab--active">Received</button>
                        <button class="header-tab">Given</button>
                    </div>
                </div>
                <div class="dashboard-header__actions">
                    <button class="dashboard-header__btn" aria-label="Notifications">
                        <span class="material-symbols-outlined">notifications</span>
                        <span class="dashboard-header__dot"></span>
                    </button>
                    <button class="dashboard-header__btn" aria-label="Profile">
                        <span class="material-symbols-outlined">account_circle</span>
                    </button>
                </div>
            </header>

            <main class="ratings-wrapper">
                
                <!-- Hero Section: Score Breakdown -->
                <section class="ratings-hero">
                    <div class="score-card">
                        <span class="material-symbols-outlined score-card__bg-icon" style="font-variation-settings: 'FILL' 1;">stars</span>
                        <p class="score-card__label">Consolidated Trust Score</p>
                        <div class="score-card__value-group">
                            <span class="score-card__big-num">4.8</span>
                            <span class="score-card__total">/ 5.0</span>
                        </div>
                        <div class="score-card__stars">
                            <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">star</span>
                            <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">star</span>
                            <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">star</span>
                            <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">star</span>
                            <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">star_half</span>
                        </div>
                        <p class="score-card__subtext">
                            Based on <strong>1,248</strong> verified transactions across the BackHouse circular network.
                        </p>
                    </div>

                    <div class="distribution-card">
                        <div class="dist-row">
                            <span class="dist-row__label">5 STAR</span>
                            <div class="dist-row__bar-wrap">
                                <div class="dist-row__bar-fill" style="width: 82%;"></div>
                            </div>
                            <span class="dist-row__percent">82%</span>
                        </div>
                        <div class="dist-row">
                            <span class="dist-row__label">4 STAR</span>
                            <div class="dist-row__bar-wrap">
                                <div class="dist-row__bar-fill" style="width: 12%;"></div>
                            </div>
                            <span class="dist-row__percent">12%</span>
                        </div>
                        <div class="dist-row">
                            <span class="dist-row__label">3 STAR</span>
                            <div class="dist-row__bar-wrap">
                                <div class="dist-row__bar-fill" style="width: 4%;"></div>
                            </div>
                            <span class="dist-row__percent">4%</span>
                        </div>
                        <div class="dist-row">
                            <span class="dist-row__label">2 STAR</span>
                            <div class="dist-row__bar-wrap">
                                <div class="dist-row__bar-fill" style="width: 1%; background: #fabd00;"></div>
                            </div>
                            <span class="dist-row__percent">1%</span>
                        </div>
                        <div class="dist-row">
                            <span class="dist-row__label">1 STAR</span>
                            <div class="dist-row__bar-wrap">
                                <div class="dist-row__bar-fill" style="width: 1%; background: #fabd00;"></div>
                            </div>
                            <span class="dist-row__percent">1%</span>
                        </div>
                    </div>
                </section>

                <!-- Filter Bar -->
                <section class="ratings-filter-bar">
                    <h3 class="section-title">All Ratings</h3>
                    <div class="sort-group">
                        <span class="sort-group__label">Sort By</span>
                        <select class="sort-group__select">
                            <option>Most Recent</option>
                            <option>Highest Rated</option>
                            <option>Lowest Rated</option>
                        </select>
                    </div>
                </section>

                <!-- Ratings Feed -->
                <section class="ratings-grid">
                    <!-- Dynamically populated by ratings.js -->
                </section>

                <!-- Show More -->
                <div id="show-more-ratings" style="display: flex; flex-direction: column; align-items: center; gap: var(--space-xs); padding: var(--space-xl) 0; cursor: pointer; color: var(--color-secondary);">
                    <span style="font-size: 0.6875rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.2em;">Show More Ratings</span>
                    <span class="material-symbols-outlined" style="color: var(--color-primary); font-size: 2rem;">expand_more</span>
                </div>

            </main>
        </div>
    </div>

    <!-- Scripts -->
    <script src="listings-data.js?v=26"></script>
    <script src="engagement-data.js?v=26"></script>
    <script src="ui-modals.js?v=26"></script>
    <script src="app.js?v=43"></script>
    <script src="ratings.js?v=26"></script>
</body>
</html>
