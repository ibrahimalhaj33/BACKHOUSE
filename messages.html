<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages | BackHouse</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Work+Sans:ital,wght@0,300..700;1,300..700&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
    <!-- Styles -->
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="messages.css">
</head>
<body class="dashboard-body">

    <div class="dashboard-layout">
        
        <!-- Sidebar Navigation (Dynamically Loaded) -->
        <aside class="dashboard-sidebar" id="main-sidebar">
            <div style="padding: 2rem; opacity: 0.5;">
                <div style="height: 40px; width: 140px; background: rgba(0,0,0,0.05); border-radius: 8px; margin-bottom: 3rem;"></div>
                <div style="height: 20px; width: 100%; background: rgba(0,0,0,0.05); border-radius: 4px; margin-bottom: 1rem;"></div>
                <div style="height: 20px; width: 80%; background: rgba(0,0,0,0.05); border-radius: 4px; margin-bottom: 1rem;"></div>
            </div>
        </aside>

        <!-- Main Content Area -->
        <div class="dashboard-main-container">
            <!-- Header (Exact copy pattern from my-purchases.html) -->
            <header class="dashboard-header">
                <div class="dashboard-header__left">
                    <h2 class="dashboard-header__title">Messages</h2>
                    <div class="dashboard-header__divider"></div>
                    <div class="dashboard-header__date">
                        <span class="material-symbols-outlined" style="font-size: 1rem;">chevron_right</span>
                        <span>Inbox</span>
                    </div>
                </div>
                <div class="dashboard-header__actions">
                    <div class="messages-search">
                        <span class="material-symbols-outlined messages-search__icon">search</span>
                        <input type="text" class="messages-search__input" placeholder="Search conversations...">
                    </div>
                    <button class="dashboard-header__btn" aria-label="Notifications">
                        <span class="material-symbols-outlined">notifications</span>
                        <span class="dashboard-header__dot"></span>
                    </button>
                    <button class="dashboard-header__btn" aria-label="Profile">
                        <span class="material-symbols-outlined">account_circle</span>
                    </button>
                </div>
            </header>

            <!-- Messages Wrapper (Full bleed inside dashboard) -->
            <main class="messages-wrapper">
                
                <!-- Left Panel: Chat List -->
                <aside class="chat-sidebar">
                    <ul class="chat-list">
                        <!-- Dynamically populated by messages.js -->
                    </ul>
                </aside>

                <!-- Right Panel: Chat Window -->
                <section class="chat-window">
                    <!-- Chat Header -->
                    <div class="chat-window__header">
                        <!-- Dynamically populated by messages.js -->
                    </div>

                    <!-- Chat Feed -->
                    <div class="chat-window__feed">
                        <!-- Dynamically populated by messages.js -->
                    </div>

                    <!-- Chat Input -->
                    <div class="chat-window__input-area">
                        <div class="chat-input-box">
                            <textarea class="chat-input-box__field" placeholder="Type your message..."></textarea>
                            <div class="chat-input-box__actions">
                                <div class="chat-input-box__tools">
                                    <button class="tool-btn"><span class="material-symbols-outlined">add_circle</span></button>
                                    <button class="tool-btn"><span class="material-symbols-outlined">sentiment_satisfied</span></button>
                                    <button class="tool-btn"><span class="material-symbols-outlined">image</span></button>
                                </div>
                                <button class="btn-send">
                                    Send
                                    <span class="material-symbols-outlined" style="font-size: 1.125rem;">send</span>
                                </button>
                            </div>
                        </div>
                        <div class="chat-input-hint">Press Shift + Enter for new line</div>
                    </div>
                </section>

            </main>
        </div>
    </div>

    <!-- Scripts -->
    <script src="listings-data.js"></script>
    <script src="app.js"></script>
    <script src="messages.js"></script>
</body>
</html>
